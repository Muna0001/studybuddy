<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="8" fill="#6366f1"/>
  <!-- Cap board (diamond shape) -->
  <polygon points="16,7 28,13 16,19 4,13" fill="white"/>
  <!-- Cap top highlight -->
  <polygon points="16,7 28,13 16,19 4,13" fill="white" opacity="0.9"/>
  <!-- Body of cap -->
  <rect x="11" y="16" width="10" height="7" rx="1" fill="white" opacity="0.85"/>
  <!-- Tassel string -->
  <line x1="28" y1="13" x2="28" y2="20" stroke="white" stroke-width="1.5"/>
  <circle cx="28" cy="21" r="1.5" fill="white"/>
</svg>
